apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30021
    - name: http-alt
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
